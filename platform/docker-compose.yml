services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aura
      POSTGRES_PASSWORD: aura_dev_password
      POSTGRES_DB: callintel
    ports:
      # 5433 on the host — a native PostgreSQL install already owns 5432
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: aura
      RABBITMQ_DEFAULT_PASS: aura_dev_password
    ports:
      - "5672:5672"
      - "15672:15672"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: aura_minio
      MINIO_ROOT_PASSWORD: aura_minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 aura_minio aura_minio_password;
      mc mb --ignore-existing local/aura-recordings;
      exit 0;
      "

volumes:
  pgdata:
  miniodata:

# Aura vhosts for a host nginx that also serves other sites.
#
#   sudo cp docker/nginx-aura.conf /etc/nginx/sites-available/aura
#   sudo ln -s /etc/nginx/sites-available/aura /etc/nginx/sites-enabled/aura
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d aura.sirahagents.com -d storage.aura.sirahagents.com
#
# Deliberately HTTP-only: certbot --nginx rewrites these blocks in place to add
# listen 443 ssl + the certificate paths + the :80 redirect. Shipping 443 blocks
# up front would reference cert files that don't exist yet and nginx would
# refuse to start.
#
# Upstreams are the loopback ports published by docker-compose.nginx.yml.

upstream aura_api  { server 127.0.0.1:18081; keepalive 16; }
upstream aura_web  { server 127.0.0.1:18080; keepalive 16; }
upstream aura_minio { server 127.0.0.1:18082; keepalive 16; }

# ── Console + API ────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name aura.sirahagents.com;

    # Console uploads are small; the device upload path is the storage vhost.
    client_max_body_size 32m;

    # /v1/* is the API, everything else is the Next.js console. ^~ so this wins
    # over any regex location another config might introduce.
    location ^~ /v1/ {
        proxy_pass http://aura_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 300s;
    }

    location / {
        proxy_pass http://aura_web;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 300s;
    }

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
}

# ── Object storage (device uploads) ──────────────────────────────────────────
# Phones PUT multipart parts here against presigned URLs the API signs using
# S3_PUBLIC_ENDPOINT. SigV4 covers the Host header, so Host MUST be forwarded
# unchanged — proxy_set_header Host $host is load-bearing, not boilerplate.
server {
    listen 80;
    listen [::]:80;
    server_name storage.aura.sirahagents.com;

    # Recording parts are multi-MB. nginx defaults to 1m, which would reject
    # every upload with 413; and buffering a large part to disk before
    # forwarding adds latency for no benefit.
    client_max_body_size 0;
    proxy_request_buffering off;
    proxy_buffering off;

    location / {
        proxy_pass http://aura_minio;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_connect_timeout 30s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;
    }
}

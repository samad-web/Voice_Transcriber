# Minimal Supabase CLI config so `supabase link` + `supabase db push` work
# against supabase/migrations (generated by scripts/sync-supabase-migrations.js).
#
# This project does NOT use Supabase Auth, Realtime, Storage or PostgREST — only
# managed Postgres. Tenancy is our own RLS on current_setting('app.org_id'),
# enforced through the non-superuser `aura_app` role, so the Data API is left
# switched off and 0007_supabase_hardening.sql revokes anon/authenticated access.
#
# If the CLI rejects this file after a version bump, run `supabase init` in a
# scratch directory and copy its config.toml over — only project_id and the
# disabled services below matter to us.

project_id = "aura-platform"

[api]
enabled = false

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = false

[auth]
enabled = false

[storage]
enabled = false

[realtime]
enabled = false
